        "@context": "https://schema.org",

          "@type": "OfferCatalog",

          "itemListElement": [
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "CRM Implementation"

            },
            {
              "@type": "Offer",
              "itemOffered": {
                "@type": "Service",
                "name": "AI Workflow Automation"

            }
          ]
        }
      }
